<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bio Lab Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
  :root{
    --bg:#0b1220;--surface:#111827;--border:#1f2937;
    --text:#f8fafc;--muted:#94a3b8;--green:#10b981;
    --yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial;background:var(--bg);color:var(--text);padding:20px}
  .wrap{max-width:1000px;margin:auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .tile-val{font-size:32px;font-weight:bold}
  .tile-unit{color:var(--muted)}
  .badge{padding:6px 10px;border-radius:20px;border:1px solid}
  .online{color:var(--green)}
  .offline{color:var(--red)}
  #danger-banner{display:none;background:#3b1111;border:1px solid var(--red);padding:12px;margin-bottom:14px}
  #danger-banner.show{display:block}
  button{padding:10px 14px;margin:4px;cursor:pointer;border-radius:6px;border:none;background:var(--border);color:white}
  button:hover{background:#374151}
  .status-tag{padding:2px 8px;border-radius:4px;font-size:12px;background:#374151}
  .status-on{background:var(--green);color:white}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <h2>Bio Lab Security Dashboard</h2>
    <div id="mqtt-status" class="badge offline">MQTT OFFLINE</div>
    
    <div style="display:flex;gap:15px;margin-top:15px;">
        <span><span class="led red" id="led-red" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#333"></span> 红灯(环境危险)</span>
        <span><span class="led yellow" id="led-yellow" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#333"></span> 黄灯(门禁告警)</span>
        <span><span class="led green" id="led-green" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#333"></span> 绿灯(运行正常)</span>
    </div>
  </div>

  <div id="danger-banner" class="card"><b>⚠ 环境告警：系统已自动开启空调处理</b></div>

  <div class="grid">
    <div class="card"><div>Temp</div><div id="temp-value" class="tile-val">--</div>°C</div>
    <div class="card"><div>Humi</div><div id="humi-value" class="tile-val">--</div>%</div>
    <div class="card"><div>Light</div><div id="light-value" class="tile-val">--</div>RAW</div>
    <div class="card"><div>Dist</div><div id="distance-value" class="tile-val">--</div>cm</div>
  </div>

  <div class="card">
    <h3>空调控制</h3>
    <button onclick="toggleAC(true)">空调开</button>
    <button onclick="toggleAC(false)">空调关</button>
    <div style="margin-top:10px;">状态: <span id="ac-status" class="status-tag">OFF</span></div>
  </div>

  <div class="card">
    <h3>照明控制</h3>
    <button onclick="toggleLight(true)">灯开</button>
    <button onclick="toggleLight(false)">灯关</button>
    <div style="margin-top:10px;">状态: <span id="light-status" class="status-tag">OFF</span></div>
  </div>
</div>

<script>
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

client.on("connect", () => {
  document.getElementById("mqtt-status").textContent = "MQTT ONLINE";
  document.getElementById("mqtt-status").className = "badge online";
  client.subscribe("bio_lab/sensor/data");
});

client.on("message", (topic, msg) => {
  try {
    const d = JSON.parse(msg.toString());
    
    // 更新数值
    document.getElementById("temp-value").textContent = d.temperature?.toFixed(1) ?? "--";
    document.getElementById("humi-value").textContent = d.humidity?.toFixed(0) ?? "--";
    document.getElementById("light-value").textContent = d.light_raw ?? "--";
    document.getElementById("distance-value").textContent = d.door_distance?.toFixed(0) ?? "--";

    // 更新 LED 灯效
    document.getElementById("led-red").style.background = d.is_danger ? "var(--red)" : "#333";
    document.getElementById("led-yellow").style.background = d.door_alert ? "var(--yellow)" : "#333";
    document.getElementById("led-green").style.background = (!d.is_danger && !d.door_alert) ? "var(--green)" : "#333";
    
    document.getElementById("danger-banner").classList.toggle("show", d.is_danger);

    // [新增] 更新空调与灯光 UI 状态
    const acEl = document.getElementById("ac-status");
    acEl.textContent = d.ac_status ? "ON" : "OFF";
    acEl.className = "status-tag " + (d.ac_status ? "status-on" : "");

    const lightEl = document.getElementById("light-status");
    lightEl.textContent = d.light_status ? "ON" : "OFF";
    lightEl.className = "status-tag " + (d.light_status ? "status-on" : "");

  } catch (e) { console.error(e); }
});

function toggleAC(v){ client.publish("bio_lab/cmd/ac", JSON.stringify({cmd:v?"on":"off"})); }
function toggleLight(v){ client.publish("bio_lab/cmd/light", JSON.stringify({cmd:v?"on":"off"})); }
</script>
</body>
</html>
