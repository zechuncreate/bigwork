<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bio Lab Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
:root{
--bg:#0b1220;--surface:#111827;--border:#1f2937;
--text:#f8fafc;--muted:#94a3b8;--green:#10b981;
--yellow:#f59e0b;--red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:var(--bg);color:var(--text);padding:20px}
.wrap{max-width:1000px;margin:auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.tile-val{font-size:32px;font-weight:bold}
.tile-unit{color:var(--muted)}
.badge{padding:6px 10px;border-radius:20px;border:1px solid}
.online{color:var(--green)}
.offline{color:var(--red)}
#danger-banner{display:none;background:#3b1111;border:1px solid var(--red)}
#danger-banner.show{display:block}
button{padding:10px 14px;margin:4px;cursor:pointer}
#alert-list{max-height:220px;overflow:auto}
.alert{padding:8px;border-left:3px solid var(--yellow);margin:6px 0}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h2>Bio Lab Security Dashboard</h2>
<div id="mqtt-status" class="badge offline">MQTT OFFLINE</div>
</div>

<div id="danger-banner" class="card">
<b>⚠ 危险告警</b><br>
环境异常
</div>

<div class="grid">
<div class="card"><div>Temperature</div><div id="temp-value" class="tile-val">--</div><div class="tile-unit">°C</div></div>
<div class="card"><div>Humidity</div><div id="humi-value" class="tile-val">--</div><div class="tile-unit">%</div></div>
<div class="card"><div>Light</div><div id="light-value" class="tile-val">--</div><div class="tile-unit">RAW</div></div>
<div class="card"><div>Distance</div><div id="distance-value" class="tile-val">--</div><div class="tile-unit">cm</div></div>
</div>

<div class="card">
<h3>设备控制</h3>
<button onclick="toggleAC(true)">空调开</button>
<button onclick="toggleAC(false)">空调关</button>
<button onclick="toggleLight(true)">灯开</button>
<button onclick="toggleLight(false)">灯关</button>
</div>

<div class="card">
<h3>告警记录</h3>
<div id="alert-list"></div>
</div>

</div>

<script>
// =========================
// MQTT 双通道（稳定方案）
// =========================
const MQTT_OPTIONS = [
  "wss://broker.emqx.io:8084/mqtt",
  "ws://broker.emqx.io:8083/mqtt"
];

let client;

function connect(index = 0) {
  const url = MQTT_OPTIONS[index];

  client = mqtt.connect(url, { reconnectPeriod: 2000 });

  client.on("connect", () => {
    setStatus(true);
    addAlert("已连接: " + url);
    client.subscribe("bio_lab/sensor/data");
  });

  client.on("error", () => {
    client.end();
    if (index < MQTT_OPTIONS.length - 1) {
      addAlert("切换备用服务器...");
      connect(index + 1);
    } else {
      setStatus(false);
    }
  });

  client.on("message", (topic, msg) => {
    try {
      const d = JSON.parse(msg.toString());

      document.getElementById("temp-value").textContent = d.temperature ?? "--";
      document.getElementById("humi-value").textContent = d.humidity ?? "--";
      document.getElementById("light-value").textContent = d.light_raw ?? "--";
      document.getElementById("distance-value").textContent = d.door_distance ?? "--";

      document.getElementById("danger-banner").classList.toggle("show", d.is_danger);

    } catch (e) {}
  });
}

function setStatus(ok) {
  const el = document.getElementById("mqtt-status");
  el.textContent = ok ? "MQTT ONLINE" : "MQTT OFFLINE";
  el.className = ok ? "badge online" : "badge offline";
}

function addAlert(msg) {
  const box = document.getElementById("alert-list");
  const div = document.createElement("div");
  div.className = "alert";
  div.textContent = new Date().toLocaleTimeString() + " " + msg;
  box.prepend(div);
}

// 控制
function toggleAC(v){
  client.publish("bio_lab/cmd/ac", JSON.stringify({cmd:v?"on":"off"}));
  addAlert("空调 " + (v?"开":"关"));
}

function toggleLight(v){
  client.publish("bio_lab/cmd/light", JSON.stringify({cmd:v?"on":"off"}));
  addAlert("灯 " + (v?"开":"关"));
}

// start
connect();
</script>

</body>
</html>
